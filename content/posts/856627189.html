---
title: "近在咫尺，却远在天涯"
date: 2011-02-07T15:57:41+08:00
categories: ["情感"]
netease_id: "856627189"
---
<p><wbr/><font color="#003366" size="3">多少次，多少年，</font></p>
<p><font color="#003366" size="3">远在天涯，</font></p>
<p><font color="#003366" size="3">任山水迢迢，任路途遥遥，</font></p>
<p><font color="#003366" size="3">我曾感觉你我近在咫尺。</font></p>
<p><font color="#003366" size="3">多少次梦中相见，</font></p>
<p><font color="#003366" size="3">多少年苦苦期盼，</font></p>
<p><font color="#003366" size="3">说着准备多年的心里话，</font></p>
<p><font color="#003366" size="3">诉说积存多年思念和牵挂。</font></p>
<p><font color="#003366" size="3"> </font></p>
<p><font color="#003366" size="3">真的有一天，</font></p>
<p><font color="#003366" size="3">若夜晚 、若梦中，</font></p>
<p><font color="#003366" size="3">任寒风肆虐，任年已喧哗，</font></p>
<p><font color="#003366" size="3">突然能与你相见，</font></p>
<p><font color="#003366" size="3">倾听久违的心情，</font></p>
<p><font color="#003366" size="3">分享彼此的变化。</font></p>
<p><font color="#003366" size="3">可为何？</font></p>
<p><font color="#003366" size="3">近在咫尺，</font></p>
<p><font color="#003366" size="3">却让我感觉远在天涯？</font></p>
