<p><wbr/>在曹县百万百姓的呐喊声中，在二零一一年春天，一场前所未有的轰轰烈烈的大讨论开始了。也许是日本的一场大地震，惊醒了曹县的决策者们。也许是教育回归了……</p> <p>其实，没有什么可讨论的。是想干？只不过是为否定过去找一个冠冕堂皇的理由；不想干？讨论之后，对曹县人民已经有了个交代。</p> <p>坚信，一场讨论决不是结束……</p> <p>担心，又是一次形式结果是不了了之！</p>
