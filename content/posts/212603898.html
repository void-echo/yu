---
title: "月亮之上-----薪水版"
date: 2008-03-03T15:10:03+08:00
categories: ["幽默笑话"]
netease_id: "212603898"
---
<p style="TEXT-INDENT: 2em"> </p>
<p style="TEXT-INDENT: 2em">我在遥望,市场之上</p>
<p style="TEXT-INDENT: 2em">有多少物价在自由的上涨</p>
<p style="TEXT-INDENT: 2em">昨天已忘,掏干了钱囊</p>
<p style="TEXT-INDENT: 2em">我要和你重逢在借钱的路上</p>
<p style="TEXT-INDENT: 2em">手头越来越紧,只能回想</p>
<p style="TEXT-INDENT: 2em">有钱的日子,像在天堂</p>
<p style="TEXT-INDENT: 2em">呕也. ..呕也 ..</p>
<p style="TEXT-INDENT: 2em">谁在呼喊，"工资快涨。"</p>
<p style="TEXT-INDENT: 2em">昂贵的猪肉像白云在飘荡。</p>
<p style="TEXT-INDENT: 2em">东边借钱，西边还帐。</p>
<p style="TEXT-INDENT: 2em">一碟碟的钞票，就送进勒银行。</p>
<p style="TEXT-INDENT: 2em">在工资没涨的苍桑中，</p>
<p style="TEXT-INDENT: 2em">致富的路在何方?</p>
<p style="TEXT-INDENT: 2em">再紧紧裤带，来碗面汤!!</p>
<p style="TEXT-INDENT: 2em">呕也，/: </p>
<p style="TEXT-INDENT: 2em"></p>
