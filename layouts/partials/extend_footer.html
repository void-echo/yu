<div class="luokuan">
  <div class="luokuan-line"></div>
  <div class="luokuan-seal" title="月影">月影</div>
  <div class="luokuan-text">教海拾贝 · 笔耕不辍</div>
</div>
{{ if .IsHome }}
<canvas id="petals" aria-hidden="true"></canvas>
<script>
(function(){
  if(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  var c=document.getElementById('petals');if(!c)return;
  var x=c.getContext('2d'),W,H,ps=[],run=true;
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;}rs();addEventListener('resize',rs);
  function mk(y){return{x:Math.random()*W,y:y,r:5+Math.random()*5,sp:.35+Math.random()*.6,a:Math.random()*6.28,va:.005+Math.random()*.012,o:.12+Math.random()*.18};}
  var N=Math.min(14,Math.round(innerWidth/110));for(var i=N;i--;)ps.push(mk(Math.random()*H));
  document.addEventListener('visibilitychange',function(){run=!document.hidden;if(run)draw();});
  function draw(){if(!run)return;x.clearRect(0,0,W,H);ps.forEach(function(p){p.y+=p.sp;p.a+=p.va;p.x+=Math.sin(p.a)*.5;if(p.y>H+12){p.y=-12;p.x=Math.random()*W;}x.save();x.translate(p.x,p.y);x.rotate(p.a);x.globalAlpha=p.o;x.fillStyle='#c25b48';x.beginPath();x.ellipse(0,0,p.r,p.r*.5,0,0,6.28);x.fill();x.restore();});requestAnimationFrame(draw);}
  draw();
})();
</script>
{{ end }}
